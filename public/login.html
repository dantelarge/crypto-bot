<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Bot — Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      text-align: center;
    }
    .login-logo { font-size: 2.5rem; margin-bottom: 8px; }
    .login-card h1 { font-size: 1.3rem; margin-bottom: 4px; }
    .login-card p { color: var(--text2); font-size: 0.85rem; margin-bottom: 28px; }
    .login-card input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 14px;
      text-align: center;
      letter-spacing: 4px;
    }
    .login-card input[type="password"]::placeholder { letter-spacing: normal; }
    .login-card input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.85; }
    .error-msg {
      color: var(--red);
      font-size: 0.85rem;
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">&#x1F916;</div>
      <h1>Crypto Bot</h1>
      <p>Enter your password to access the dashboard</p>
      <form id="loginForm">
        <input type="password" id="password" placeholder="Enter password" autofocus autocomplete="current-password" />
        <button type="submit" class="btn-login">Unlock Dashboard</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>
  </div>
  <script>
    'use strict';
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Checking...';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const json = await res.json();
        if (json.ok) {
          window.location.href = '/';
        } else {
          document.getElementById('errorMsg').textContent = 'Wrong password. Try again.';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch {
        document.getElementById('errorMsg').textContent = 'Connection error. Try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Unlock Dashboard';
      }
    });
  </script>
</body>
</html>
